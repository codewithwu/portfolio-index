<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0c0f14;
            --bg-secondary: #141922;
            --bg-card: #1a1f2a;
            --accent-emerald: #10b981;
            --accent-violet: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-subtle: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(16, 185, 129, 0.06) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { top: -100px; left: 10%; width: 500px; height: 500px; background: var(--accent-emerald); }
        .glow-2 { bottom: -150px; right: 5%; width: 600px; height: 600px; background: var(--accent-violet); }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 32px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 64px;
        }

        .header-left {
            text-align: left;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-emerald) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .header-github {
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .header-github:hover {
            color: var(--accent-emerald);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
        }

        .card-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .card-github {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--accent-emerald);
            text-decoration: none;
        }

        .card-github:hover {
            text-decoration: underline;
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 0;
            grid-column: 1 / -1;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 40px 16px; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>作品集</h1>
                <p>个人项目展示</p>
            </div>
            <a href="https://github.com/codewithwu/portfolio-index" target="_blank" class="header-github">
                <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
        </div>
        <div class="grid" id="projects"></div>
    </div>

    <script>
        async function loadProjects() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();

                data.sort((a, b) => a.star - b.star);

                const container = document.getElementById('projects');

                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">No projects yet</div>';
                    return;
                }

                container.innerHTML = data.map(item => `
                    <a href="${item.path}" class="card">
                        <div class="card-name">${item.name}</div>
                        <div class="card-desc">${item.description || ''}</div>
                        <div style="font-size: 0.85rem; color: var(--accent-emerald); margin-top: 8px;">点击查看详情</div>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('projects').innerHTML =
                    '<div class="empty">Failed to load projects</div>';
            }
        }

        loadProjects();
    </script>
</body>
</html>
